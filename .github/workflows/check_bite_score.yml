name: Check Bite Score

on:
  schedule:
    # Every 30 minutes (UTC). GitHub may delay scheduled runs under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# Allow the workflow to commit updated data files back to the repo.
permissions:
  contents: write

concurrency:
  group: bite-score
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Calculate bite score
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/score_calculator.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_score.json data/history.json \
                  docs/data/latest_score.json docs/data/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update bite score [skip ci]"
            git push
          fi
